<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground Archive | Jocelyn Martinez</title>
    <style>
        /* Typography and Variables */
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #FDFBF7;
            --ink: #2A2A2A;
            --primary: #A88980;
            --primary-dark: #8A6E66;
            --grey: #888888;
            --serif: 'Cormorant Garamond', serif;
            --sans: 'Plus Jakarta Sans', sans-serif;
        }

        /* Film Grain Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.025;
            pointer-events: none;
            z-index: 9999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body { 
            background-color: var(--bg); 
            color: var(--ink); 
            font-family: var(--sans); 
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Prevent background scroll when modal is open */
        body.modal-open { overflow: hidden; }

        /* FIXED CUSTOM CURSOR */
        #cursor-dot, #cursor-trailer {
            position: fixed;
            top: 0; left: 0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000000; /* Set extremely high to stay above modal and grain */
            will-change: transform;
        }
        
        #cursor-dot {
            width: 8px; height: 8px;
            background: var(--ink);
            margin-left: -4px; /* Center the dot */
            margin-top: -4px;
            transition: background 0.3s, width 0.3s, height 0.3s;
        }

        #cursor-trailer {
            width: 30px; height: 30px;
            border: 1px solid var(--primary);
            margin-left: -15px; /* Center the trailer */
            margin-top: -15px;
            transition: width 0.4s cubic-bezier(0.19, 1, 0.22, 1), 
                        height 0.4s cubic-bezier(0.19, 1, 0.22, 1), 
                        background 0.4s, border-color 0.4s;
        }

        /* Navigation */
        nav {
            position: fixed;
            width: 100%;
            padding: 2.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .logo { font-family: var(--serif); font-size: 1.6rem; font-style: italic; color: var(--ink); text-decoration: none; }

        .archive-header { padding: 15rem 5% 5rem; }
        .archive-header h1 { font-family: var(--serif); font-size: clamp(3rem, 8vw, 6rem); font-weight: 300; }

        /* Gallery Grid */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6vw;
            padding: 0 5% 10rem;
        }

        .archive-item { text-decoration: none; color: inherit; display: block; }

        .mockup-frame {
            width: 100%;
            height: 80vh; 
            overflow: hidden;
            background: #EBE8E1;
            border-radius: 4px;
            position: relative;
            border: 1px solid rgba(42, 42, 42, 0.05);
        }

        .mockup-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .archive-item:hover .mockup-frame img { transform: scale(1.03); }

        /* --- THE MODAL (EXPANDED VIEW) --- */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(253, 251, 247, 0.95);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            overflow-y: scroll;
            padding: 5vh 0;
        }

        #modal-overlay.active { display: block; opacity: 1; }

        .modal-content {
            width: 85%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .modal-content img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        .close-btn {
            position: fixed;
            top: 40px; right: 5%;
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--ink);
            background: none;
            border: none;
            padding: 10px;
            z-index: 10002;
        }

        /* Scroll Reveal */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s cubic-bezier(0.25, 1, 0.5, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        @media (max-width: 900px) {
            .archive-grid { grid-template-columns: 1fr; }
            .mockup-frame { height: 60vh; }
        }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <button class="close-btn" onclick="closeModal()">Close — ESC</button>
        <div class="modal-content">
            <img id="modal-img" src="" alt="Full website mockup">
        </div>
    </div>

    <nav>
        <a href="index.html" class="logo">Jocelyn</a>
        <a href="index.html" style="text-decoration: none; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--ink); font-weight: 600; opacity: 0.6;">Back to Index</a>
    </nav>

    <header class="archive-header reveal">
        <h1>The Playground <i>Archive</i></h1>
    </header>

    <main class="archive-grid">
        <a href="#" class="archive-item reveal" onclick="openModal(event, 'bauhaus.png')">
            <div class="mockup-frame"><img src="bauhaus.png" alt="Bauhaus Design"></div>
        </a>

        <a href="#" class="archive-item reveal" onclick="openModal(event, 'aetheressence.png')">
            <div class="mockup-frame"><img src="aetheressence.png" alt="Aether Essence"></div>
        </a>

        <a href="#" class="archive-item reveal" onclick="openModal(event, 'digitalpoetics.png')">
            <div class="mockup-frame"><img src="digitalpoetics.png" alt="Digital Poetics"></div>
        </a>

        <a href="#" class="archive-item reveal" onclick="openModal(event, 'Solsticestudio.png')">
            <div class="mockup-frame"><img src="Solsticestudio.png" alt="Solstice Studio"></div>
        </a>

        <a href="#" class="archive-item reveal" onclick="openModal(event, 'villageauto.png')">
            <div class="mockup-frame"><img src="villageauto.png" alt="Village Auto"></div>
        </a>
    </main>

    <div id="cursor-dot"></div>
    <div id="cursor-trailer"></div>

    <script>
        /* Refined Cursor Logic */
        const cursorDot = document.getElementById('cursor-dot');
        const cursorTrailer = document.getElementById('cursor-trailer');
        let mouseX = 0, mouseY = 0;
        let trailerX = 0, trailerY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Immediate movement using transform for performance
            cursorDot.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0)`;
        });

        function animateTrailer() {
            let dx = mouseX - trailerX;
            let dy = mouseY - trailerY;
            
            trailerX += dx * 0.15;
            trailerY += dy * 0.15;
            
            cursorTrailer.style.transform = `translate3d(${trailerX}px, ${trailerY}px, 0)`;
            requestAnimationFrame(animateTrailer);
        }
        animateTrailer();

        // Cursor feedback on interactive elements
        const updateInteractiveListeners = () => {
            const interactiveElements = document.querySelectorAll('a, button, .archive-item');
            interactiveElements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursorTrailer.style.width = '60px';
                    cursorTrailer.style.height = '60px';
                    cursorTrailer.style.background = 'rgba(168, 137, 128, 0.1)';
                    cursorTrailer.style.borderColor = 'transparent';
                });
                el.addEventListener('mouseleave', () => {
                    cursorTrailer.style.width = '30px';
                    cursorTrailer.style.height = '30px';
                    cursorTrailer.style.background = 'transparent';
                    cursorTrailer.style.borderColor = 'var(--primary)';
                });
            });
        };
        updateInteractiveListeners();

        /* --- MODAL LOGIC --- */
        const modal = document.getElementById('modal-overlay');
        const modalImg = document.getElementById('modal-img');

        function openModal(e, imgSrc) {
            e.preventDefault();
            modalImg.src = imgSrc;
            modal.style.display = 'block';
            setTimeout(() => {
                modal.classList.add('active');
            }, 10);
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.classList.remove('modal-open');
            setTimeout(() => { 
                modal.style.display = 'none';
                modalImg.src = ""; 
            }, 500);
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
        });

        /* Scroll Reveal Logic */
        function reveal() {
            const reveals = document.querySelectorAll(".reveal");
            reveals.forEach(el => {
                let windowHeight = window.innerHeight;
                let elementTop = el.getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) el.classList.add("active");
            });
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>
</body>
</html>
